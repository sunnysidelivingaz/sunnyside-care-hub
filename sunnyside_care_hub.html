  --refused-bg:#fce8e8;--refused:#a32020;--refused-border:#f0a0a0;
  --held-bg:#fff3d8;--held:#7a5000;--held-border:#f0c860;
  --na-bg:#f1efeb;--na:#5f5e5a;--na-border:#ccc;
  --adrian:#2d6a4f;--adrian-l:#e8f5ef;
  --andre:#1a5fa8;--andre-l:#e6f0fb;
  --ava:#7b2d8b;--ava-l:#f3e8f7;
  --dylan:#c45e1a;--dylan-l:#fdf0e6;
  --miley:#0f6e56;--miley-l:#e1f5ee;
  --melody:#b52b6e;--melody-l:#fce8f2;
  --messiah:#a32020;--messiah-l:#fce8e8;
  --west:#8a5c00;--west-l:#fdf3d8;
  --mateo:#3d3489;--mateo-l:#eeedfe;
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px 11px;position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:#2d6a4f;flex-shrink:0}
.hdate{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.haddr{font-size:10px;color:var(--muted);margin-top:2px}
.main{padding:15px 13px 0;max-width:500px;margin:0 auto}
.setup-banner{background:#fff8e6;border:1px solid #f0d060;border-radius:var(--r);padding:12px 14px;font-size:11px;color:#7a5c00;line-height:1.6;margin-bottom:16px}
.setup-banner strong{color:#5a4200;display:block;margin-bottom:2px}
.setup-banner code{background:#fde68a;padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px}
.loc-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 9px}
.loc-hdr:first-of-type{margin-top:0}
.loc-badge{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.loc-line{flex:1;height:1px;background:var(--border)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;gap:10px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:600;letter-spacing:-.2px;line-height:1.2}
.cd{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.chev{color:var(--muted);font-size:15px;transition:transform .2s;flex-shrink:0}
.card.open .chev{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}
.section-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 12px 4px}
.time-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;user-select:none}
.time-btn:last-child{border-bottom:none}
.time-btn:active{background:var(--bg)}
.time-left{display:flex;align-items:center;gap:9px}
.time-icon{font-size:15px}
.time-text{font-size:12px;font-weight:500}
.time-sub{font-size:10px;color:var(--muted);margin-top:1px;font-family:'DM Mono',monospace}
.time-right{display:flex;align-items:center;gap:6px}
.signed-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500}
.signed-badge.done{background:var(--given-bg);color:var(--given)}
.time-arr{font-size:14px;color:var(--muted);transition:transform .2s}
.time-btn.active .time-arr{transform:rotate(90deg)}
/* Sign-off panel */
.signoff{display:none;border-top:1px solid var(--border);background:#fafaf8;padding:12px}
.signoff.open{display:block}
.signoff-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.med-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 10px;margin-bottom:7px}
.med-name{font-size:12px;font-weight:500;margin-bottom:2px}
.med-dose{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:7px}
.med-note-pill{display:inline-block;font-size:9px;background:#fff3d8;color:#7a5000;border-radius:3px;padding:1px 5px;margin-bottom:5px;font-weight:500}
.toggle-row{display:flex;gap:5px;flex-wrap:wrap}
.tog{flex:1;min-width:56px;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .12s;user-select:none}
.tog.sel-given{background:var(--given-bg);color:var(--given);border-color:var(--given-border)}
.tog.sel-refused{background:var(--refused-bg);color:var(--refused);border-color:var(--refused-border)}
.tog.sel-held{background:var(--held-bg);color:var(--held);border-color:var(--held-border)}
.tog.sel-na{background:var(--na-bg);color:var(--na);border-color:var(--na-border)}
.signoff-footer{margin-top:10px;display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.initials-wrap{display:flex;flex-direction:column;gap:3px}
.initials-label{font-size:10px;color:var(--muted);font-weight:500}
.initials-input{width:72px;padding:8px 10px;font-size:13px;font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);text-transform:uppercase}
.initials-input:focus{outline:none;border-color:#888}
.notes-wrap{flex:1;display:flex;flex-direction:column;gap:3px;min-width:120px}
.notes-label{font-size:10px;color:var(--muted);font-weight:500}
.notes-input{width:100%;padding:7px 9px;font-size:11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);resize:none;font-family:'DM Sans',sans-serif}
.notes-input:focus{outline:none;border-color:#888}
.submit-btn{width:100%;margin-top:10px;padding:11px;font-size:13px;font-weight:600;border-radius:var(--rs);border:none;cursor:pointer;transition:opacity .15s;letter-spacing:.01em}
.submit-btn:active{opacity:.8}
.submit-btn.ready{background:#1a6b3c;color:#fff}
.submit-btn.loading{background:#ccc;color:#888;pointer-events:none}
.submit-btn.error{background:#a32020;color:#fff}
.success-msg{display:none;background:var(--given-bg);border:1px solid var(--given-border);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--given);font-weight:500;text-align:center;margin-top:8px}
.success-msg.show{display:block}
/* Shared section */
.shared-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.shared-row:last-child{border-bottom:none}
.shared-row:active{background:var(--bg)}
.sr-icon{font-size:16px}
.sr-text{flex:1}
.sr-name{font-size:12px;font-weight:500}
.sr-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.sr-arr{font-size:13px;color:var(--muted)}

.adrian .av{background:var(--adrian-l);color:var(--adrian)}

footer{text-align:center;padding:28px 16px 0;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}

const SHARED = [
  { id:'bathroom', icon:'🚿', name:'Bathroom Log', sub:'E = eliminated · B = bowel movement' },
  { id:'sleep', icon:'😴', name:'Sleep Log', sub:'Sleep period start & end · medication given' },
  { id:'bodychart', icon:'🩺', name:'Body Chart', sub:'Areas of discomfort · symptom type' },
  { id:'hab', icon:'⭐', name:'Habilitation Goal', sub:'Daily goal tracking · +/B/R' }
];

// State: which sign-off panels are open
const openPanels = {};
const signedOff = {};

function today() {
  return new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'});
}

function buildUI() {
  const main = document.getElementById('main');
  const configured = true;

  let html = '';
  if (!configured) {
    html += `<div class="setup-banner"><strong>Setup required — data not yet saving</strong>
      See the setup guide below to connect Google Sheets in 5 minutes. Until then, the sign-off UI is fully functional but submissions won't be saved.
      <br><br>Quick steps: 1) Create a Google Sheet · 2) Open <a href="https://script.google.com" target="_blank" style="color:#5a4200">script.google.com</a> · 3) Paste the Apps Script code · 4) Deploy as web app · 5) Replace <code>https://script.google.com/macros/s/AKfycbwqFA65qa1UME5PNi_zTfrLNLf_UfteG3kv77wT95Wm5ELxzY1Z0-wsqMYcAEvqY8sI/exec</code> in this file with your web app URL.</div>`;
  }

  const locs = [...new Set(RESIDENTS.map(r => r.loc))];
  locs.forEach(loc => {
    html += `<div class="loc-hdr"><div class="loc-badge">${loc}</div><div class="loc-line"></div></div>`;
    RESIDENTS.filter(r => r.loc === loc).forEach(r => {
      html += buildResidentCard(r);
    });
  });

  html += `<div class="loc-hdr"><div class="loc-badge">Shared — all residents</div><div class="loc-line"></div></div>`;
  html += `<div class="card"><div class="card-body" style="display:block">`;
  SHARED.forEach(s => {
    html += `<div class="shared-row" onclick="alert('Shared log forms coming soon — tap a resident above for MAR sign-off.')">
      <div class="sr-icon">${s.icon}</div>
      <div class="sr-text"><div class="sr-name">${s.name}</div><div class="sr-sub">${s.sub}</div></div>
      <div class="sr-arr">›</div></div>`;
  });
  html += `</div></div>`;

  html += `<footer>Sunnyside Living · Care Hub v3.0 · 9 residents · 2 locations</footer>`;
  main.innerHTML = html;
}

function buildResidentCard(r) {
  let schedHTML = '';
  r.schedules.forEach((sch, si) => {
    const pid = `${r.id}-${si}`;
    const isOpen = openPanels[pid];
    const isSigned = signedOff[pid];
    const subtext = sch.meds.slice(0,3).map(m=>m.n).join(' · ') + (sch.meds.length > 3 ? ` +${sch.meds.length-3} more` : '');
    schedHTML += `
      <div class="time-btn ${isOpen?'active':''}" onclick="togglePanel('${pid}','${r.id}',${r.schedules.indexOf(sch)})">
        <div class="time-left">
          <div class="time-icon">${sch.icon}</div>
          <div><div class="time-text">${sch.time}</div><div class="time-sub">${subtext}</div></div>
        </div>
        <div class="time-right">
          ${isSigned ? '<span class="signed-badge done">✓ Signed</span>' : ''}
          <div class="time-arr">›</div>
        </div>
      </div>
      <div class="signoff ${isOpen?'open':''}" id="panel-${pid}">${isOpen ? buildSignoff(r, sch, pid) : ''}</div>`;
  });

  return `<div class="card ${r.color}" id="card-${r.id}">
    <div class="card-hdr" onclick="toggleCard('${r.id}')">
      <div class="av">${r.av}</div>
      <div class="ci"><div class="cn">${r.name}</div><div class="cd">DOB: ${r.dob} · ${r.tags}</div></div>
      <div class="chev">&#8964;</div>
    </div>
    <div class="card-body">${schedHTML}</div>
  </div>`;
}

function buildSignoff(r, sch, pid) {
  const isHab = sch.type === 'hab';
  const opts = isHab
    ? [['+ Completed','sel-given'],['- Unsuccessful','sel-refused'],['B Barrier','sel-held'],['R Refused','sel-na']]
    : [['Given','sel-given'],['Refused','sel-refused'],['Held','sel-held'],['N/A','sel-na']];

  let medsHTML = sch.meds.map((m, mi) => `
    <div class="med-row">
      <div class="med-name">${m.n}</div>
      <div class="med-dose">${m.d}</div>
      ${m.note ? `<div class="med-note-pill">${m.note}</div>` : ''}
      <div class="toggle-row">
        ${opts.map(([label, cls]) =>
          `<div class="tog" data-pid="${pid}" data-mi="${mi}" data-val="${cls}" onclick="selectTog(this,'${pid}',${mi},'${cls}')">${label}</div>`
        ).join('')}
      </div>
    </div>`).join('');

  return `<div class="signoff-title">${r.name} · ${sch.time} · ${today()}</div>
    ${medsHTML}
    <div class="signoff-footer">
      <div class="initials-wrap">
        <div class="initials-label">Staff initials *</div>
        <input class="initials-input" id="init-${pid}" maxlength="5" placeholder="S.J." autocomplete="off">
      </div>
      <div class="notes-wrap">
        <div class="notes-label">Notes (optional)</div>
        <textarea class="notes-input" id="notes-${pid}" rows="2" placeholder="Any observations..."></textarea>
      </div>
    </div>
    <button class="submit-btn ready" id="btn-${pid}" onclick="submitSignoff('${pid}','${r.id}','${sch.time}',${r.schedules.indexOf(sch)})">Sign Off — ${sch.time}</button>
    <div class="success-msg" id="ok-${pid}">✓ Sign-off recorded for ${sch.time}</div>`;
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function togglePanel(pid, rid, si) {
  const wasOpen = openPanels[pid];
  openPanels[pid] = !wasOpen;
  refreshCard(rid);
}

function refreshCard(rid) {
  const r = RESIDENTS.find(x => x.id === rid);
  const card = document.getElementById('card-' + rid);
  const wasOpen = card.classList.contains('open');
  const newHTML = buildResidentCard(r);
  const tmp = document.createElement('div');
  tmp.innerHTML = newHTML;
  const newCard = tmp.firstChild;
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
}

function selectTog(el, pid, mi, val) {
  const row = el.closest('.toggle-row');
  row.querySelectorAll('.tog').forEach(t => {
    t.classList.remove('sel-given','sel-refused','sel-held','sel-na');
  });
  el.classList.add(val);
}

async function submitSignoff(pid, rid, time, si) {
  const r = RESIDENTS.find(x => x.id === rid);
  const sch = r.schedules[si];
  const initials = document.getElementById('init-' + pid).value.trim().toUpperCase();
  const notes = document.getElementById('notes-' + pid).value.trim();

  if (!initials) { alert('Please enter your staff initials.'); return; }

  const medStatuses = [];
  sch.meds.forEach((m, mi) => {
    const panel = document.getElementById('panel-' + pid);
    const rows = panel.querySelectorAll('.toggle-row');
    const sel = rows[mi] ? rows[mi].querySelector('.tog[class*="sel-"]') : null;
    medStatuses.push({ med: m.n, dose: m.d, status: sel ? sel.textContent : 'Not recorded' });
  });

  const allRecorded = medStatuses.every(ms => ms.status !== 'Not recorded');
  if (!allRecorded) {
    const missing = medStatuses.filter(ms => ms.status === 'Not recorded').map(ms => ms.med).join(', ');
    if (!confirm(`Some medications have no status recorded:\n${missing}\n\nSubmit anyway?`)) return;
  }

  const btn = document.getElementById('btn-' + pid);
  const okMsg = document.getElementById('ok-' + pid);
  btn.textContent = 'Saving...';
  btn.className = 'submit-btn loading';

  const payload = {
    timestamp: new Date().toISOString(),
    date: today(),
    resident: r.name,
    dob: r.dob,
    location: r.loc,
    timeSlot: time,
    medications: medStatuses,
    initials,
    notes
  };

  if (false) {
    await new Promise(res => setTimeout(res, 600));
    btn.style.display = 'none';
    okMsg.textContent = '✓ Sign-off recorded (not saved — connect Google Sheets to save data)';
    okMsg.classList.add('show');
    signedOff[pid] = true;
    return;
  }

  try {
    // Send as plain text - JSON content-type gets blocked by browser security
    await fetch(ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });
    btn.style.display = 'none';
    okMsg.classList.add('show');
    signedOff[pid] = true;
  } catch(err) {
    btn.textContent = 'Error — tap to retry';
    btn.className = 'submit-btn error';
    btn.onclick = () => submitSignoff(pid, rid, time, si);
  }
}

// Init
document.getElementById('hdate').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
buildUI();
</script>
